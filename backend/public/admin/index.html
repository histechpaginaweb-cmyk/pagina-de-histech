<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>HISTECH · Administrador de productos</title>
    <style>
      :root {
        --bg: #050816;
        --surface: #0b1020;
        --surface2: #11182e;
        --border: rgba(255, 255, 255, 0.1);
        --text: #e8eaf2;
        --muted: #97a0b8;
        --purple: #7c3aed;
        --purple2: #a855f7;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      a { color: var(--purple2); }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 18px 80px; }
      header.top {
        display: flex; align-items: center; justify-content: space-between;
        gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border);
        margin-bottom: 26px;
      }
      .brand { font-weight: 800; letter-spacing: 0.06em; font-size: 20px; }
      .brand span { color: var(--purple2); }
      .muted { color: var(--muted); }
      button {
        font: inherit; cursor: pointer; border-radius: 10px;
        border: 1px solid var(--border); background: var(--surface2);
        color: var(--text); padding: 10px 16px; transition: 0.15s;
      }
      button:hover { border-color: var(--purple); }
      button.primary {
        background: linear-gradient(135deg, var(--purple), var(--purple2));
        border-color: transparent; font-weight: 600;
      }
      button.ghost { background: transparent; }
      button.danger { background: transparent; border-color: rgba(239,68,68,0.4); color: #fda4a4; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input, textarea {
        width: 100%; font: inherit; color: var(--text);
        background: var(--bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 10px 12px; outline: none;
      }
      input:focus, textarea:focus { border-color: var(--purple); }
      label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; }
      textarea { min-height: 84px; resize: vertical; }

      /* Login */
      .login { max-width: 380px; margin: 8vh auto 0; background: var(--surface);
        border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
      .login h1 { margin: 0 0 4px; font-size: 22px; }
      .err { color: #fda4a4; font-size: 13px; min-height: 18px; margin-top: 10px; }

      /* Grid de productos */
      .grid { display: grid; gap: 18px; grid-template-columns: 1fr; }
      @media (min-width: 720px) { .grid { grid-template-columns: 1fr 1fr; } }
      .card { background: var(--surface); border: 1px solid var(--border);
        border-radius: 16px; padding: 18px; }
      .thumb { width: 100%; aspect-ratio: 16/10; object-fit: cover;
        border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); }
      .thumb.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .row > * { flex: 1; }
      .card-actions { display: flex; gap: 10px; margin-top: 14px; }
      .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px;
        border-radius: 12px; opacity: 0; transition: 0.2s; pointer-events: none; }
      .toast.show { opacity: 1; }
      .hide { display: none !important; }
      .spinner { font-size: 12px; color: var(--muted); }

      /* Pestañas */
      .tabs { display: flex; gap: 6px; margin-bottom: 22px; border-bottom: 1px solid var(--border); }
      .tab {
        background: transparent; border: none; border-bottom: 2px solid transparent;
        border-radius: 0; padding: 11px 16px; color: var(--muted); font-weight: 500;
      }
      .tab:hover { color: var(--text); border-color: transparent; }
      .tab.active { color: var(--text); border-bottom-color: var(--purple2); }
      .tabhead { margin-bottom: 14px; }
      .text-slug { font-weight: 700; margin-bottom: 4px; }
      .text-slug .muted { font-weight: 400; font-size: 12px; }
      #textsGrid { grid-template-columns: 1fr; }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="loginView" class="login hide">
      <div class="brand" style="margin-bottom:14px">HI<span>STECH</span> · Admin</div>
      <h1>Iniciar sesión</h1>
      <p class="muted" style="margin-top:4px">Gestiona los productos del carrusel.</p>
      <form id="loginForm">
        <label for="user">Usuario</label>
        <input id="user" autocomplete="username" required />
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <div class="err" id="loginErr"></div>
        <button class="primary" style="width:100%;margin-top:14px" type="submit">Entrar</button>
      </form>
    </div>

    <!-- PANEL -->
    <div id="panelView" class="wrap hide">
      <header class="top">
        <div class="brand">HI<span>STECH</span> · Admin</div>
        <div class="row" style="flex:0 0 auto">
          <button class="ghost" id="logoutBtn">Salir</button>
        </div>
      </header>

      <div class="tabs">
        <button class="tab active" data-tab="products" type="button">Productos del carrusel</button>
        <button class="tab" data-tab="texts" type="button">Textos de las páginas</button>
      </div>

      <!-- TAB: Productos del carrusel -->
      <div id="tab-products">
        <div class="tabhead">
          <button class="ghost" id="addBtn" type="button">+ Nuevo producto</button>
        </div>
        <p class="muted" id="status">Cargando…</p>
        <div class="grid" id="grid"></div>
      </div>

      <!-- TAB: Textos de las páginas de servicio -->
      <div id="tab-texts" class="hide">
        <p class="muted" id="textsStatus">Cargando…</p>
        <div class="grid" id="textsGrid"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
