<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>HISTECH · Panel de administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface2: #f3f4f6;
        --border: #e5e7eb;
        --text: #111827;
        --muted: #4b5563;
        --purple: #7c3aed;
        --purple2: #a855f7;
        --danger: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #ffffff;
        background-image: radial-gradient(72% 46% at 50% 0%, rgba(124, 58, 237, 0.07), transparent 72%);
        background-attachment: fixed;
        color: var(--text);
      }
      a { color: var(--purple); }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 18px 80px; }
      header.top {
        display: flex; align-items: center; justify-content: space-between;
        gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border);
        margin-bottom: 26px;
      }
      .brand { font-weight: 800; letter-spacing: 0.06em; font-size: 20px; color: var(--text); }
      .brand span { color: var(--purple); }
      .muted { color: var(--muted); }
      button {
        font: inherit; cursor: pointer; border-radius: 10px;
        border: 1px solid var(--border); background: var(--surface2);
        color: var(--text); padding: 10px 16px; transition: 0.15s;
      }
      button:hover { border-color: var(--purple); }
      button.primary {
        background: linear-gradient(135deg, var(--purple), var(--purple2));
        border-color: transparent; color: #fff; font-weight: 600;
        box-shadow: 0 6px 16px rgba(124, 58, 237, 0.25);
      }
      button.primary:hover { filter: brightness(1.05); }
      button.ghost { background: transparent; color: var(--text); }
      button.danger { background: transparent; border-color: rgba(220, 38, 38, 0.35); color: var(--danger); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input, textarea {
        width: 100%; font: inherit; color: var(--text);
        background: #fff; border: 1px solid var(--border);
        border-radius: 10px; padding: 10px 12px; outline: none;
      }
      input:focus, textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12); }
      label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; }
      textarea { min-height: 84px; resize: vertical; }

      /* Login */
      .login { max-width: 380px; margin: 8vh auto 0; background: var(--surface);
        border: 1px solid var(--border); border-radius: 16px; padding: 28px;
        box-shadow: 0 12px 34px rgba(17, 24, 39, 0.08); }
      .login h1 { margin: 0 0 4px; font-size: 22px; }
      .err { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 10px; }

      /* Grid de productos */
      .grid { display: grid; gap: 18px; grid-template-columns: 1fr; }
      @media (min-width: 720px) { .grid { grid-template-columns: 1fr 1fr; } }
      .card { background: var(--surface); border: 1px solid var(--border);
        border-radius: 16px; padding: 18px; box-shadow: 0 4px 16px rgba(17, 24, 39, 0.05); }
      .thumb { width: 100%; aspect-ratio: 16/10; object-fit: cover;
        border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); }
      .thumb.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .row > * { flex: 1; }
      .card-actions { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
      .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #fff; color: var(--text); border: 1px solid var(--border); padding: 12px 20px;
        border-radius: 12px; box-shadow: 0 12px 30px rgba(17, 24, 39, 0.14);
        opacity: 0; transition: 0.2s; pointer-events: none; }
      .toast.show { opacity: 1; }
      .hide { display: none !important; }
      .spinner { font-size: 12px; color: var(--muted); }

      /* Pestañas */
      .tabs { display: flex; gap: 6px; margin-bottom: 22px; border-bottom: 1px solid var(--border); }
      .tab {
        background: transparent; border: none; border-bottom: 2px solid transparent;
        border-radius: 0; padding: 11px 16px; color: var(--muted); font-weight: 500;
      }
      .tab:hover { color: var(--text); border-color: transparent; }
      .tab.active { color: var(--text); border-bottom-color: var(--purple2); }
      .tabhead { margin-bottom: 14px; }
      .text-slug { font-weight: 700; margin-bottom: 4px; }
      .text-slug .muted { font-weight: 400; font-size: 12px; }
      #textsGrid, #blogGrid, #casesGrid { grid-template-columns: 1fr; }

      /* ── Vista tipo "preview" (el admin se parece a la web) ── */
      .pv-url { font-size: 12px; color: var(--muted); margin-bottom: 12px; word-break: break-all; }
      .pv-url b { color: var(--text); }
      .pv-head { display: flex; gap: 14px; align-items: flex-start; }
      .pv-icon {
        width: 48px; height: 48px; flex: 0 0 auto; display: grid; place-items: center;
        border-radius: 12px; background: rgba(124, 58, 237, 0.10); border: 1px solid rgba(124, 58, 237, 0.18);
      }
      .pv-icon input {
        border: none; background: transparent; text-align: center; padding: 0; height: auto;
        font-size: 10px; color: var(--purple); font-weight: 600;
      }
      .pv-icon input:focus { box-shadow: none; }
      .pv-grow { flex: 1; min-width: 0; }
      .pv-metricbox { flex: 0 0 auto; width: 150px; text-align: right; }
      .pv-eyebrow {
        font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--purple); margin: 0 0 6px;
      }
      .pv-fieldlabel { font-size: 11px; color: var(--muted); margin: 10px 0 5px; font-weight: 500; }
      .pv-title input { font-size: 19px; font-weight: 700; color: var(--text); }
      .pv-metricbox input[data-f="metric"] {
        font-size: 22px; font-weight: 800; color: var(--purple); text-align: right;
      }
      .pv-metricbox input[data-f="metricLabel"] { font-size: 12px; text-align: right; }
      .pv-cols { display: grid; gap: 12px; grid-template-columns: 1fr; margin-top: 16px; }
      @media (min-width: 780px) { .pv-cols { grid-template-columns: 1fr 1fr 1fr; } }
      .pv-col { border: 1px solid var(--border); border-radius: 14px; background: var(--surface2); padding: 14px; }
      .pv-col.result {
        border-color: rgba(124, 58, 237, 0.22);
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.08), rgba(168, 85, 247, 0.08));
      }
      .pv-col h4 {
        margin: 0 0 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
        text-transform: uppercase; color: var(--purple);
      }
      .pv-col textarea { background: #fff; min-height: 96px; }
      .pv-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; min-height: 4px; }
      .pv-chip {
        border: 1px solid var(--border); background: #fff; border-radius: 999px;
        padding: 3px 11px; font-size: 12px; color: var(--muted);
      }
      .pv-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0 0; }
      /* Cabecera de cada tarjeta de "Textos" y "Blog" con estética de la web */
      .pv-pagehead { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="loginView" class="login hide">
      <div class="brand" style="margin-bottom:14px">HI<span>STECH</span> · Admin</div>
      <h1>Iniciar sesión</h1>
      <p class="muted" style="margin-top:4px">Gestiona los productos del carrusel.</p>
      <form id="loginForm">
        <label for="user">Usuario</label>
        <input id="user" autocomplete="username" required />
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <div class="err" id="loginErr"></div>
        <button class="primary" style="width:100%;margin-top:14px" type="submit">Entrar</button>
      </form>
    </div>

    <!-- PANEL -->
    <div id="panelView" class="wrap hide">
      <header class="top">
        <div class="brand">HI<span>STECH</span> · Admin</div>
        <div class="row" style="flex:0 0 auto">
          <button class="ghost" id="logoutBtn">Salir</button>
        </div>
      </header>

      <div class="tabs">
        <button class="tab active" data-tab="products" type="button">Productos del carrusel</button>
        <button class="tab" data-tab="texts" type="button">Textos de las páginas</button>
        <button class="tab" data-tab="cases" type="button">Casos de éxito</button>
        <button class="tab" data-tab="blog" type="button">Blog</button>
      </div>

      <!-- TAB: Productos del carrusel -->
      <div id="tab-products">
        <div class="tabhead">
          <button class="ghost" id="addBtn" type="button">+ Nuevo producto</button>
        </div>
        <p class="muted" id="status">Cargando…</p>
        <div class="grid" id="grid"></div>
      </div>

      <!-- TAB: Textos de las páginas de servicio -->
      <div id="tab-texts" class="hide">
        <p class="muted" id="textsStatus">Cargando…</p>
        <div class="grid" id="textsGrid"></div>
      </div>

      <!-- TAB: Casos de éxito -->
      <div id="tab-cases" class="hide">
        <div class="tabhead">
          <button class="ghost" id="addCaseBtn" type="button">+ Nuevo caso de éxito</button>
        </div>
        <p class="muted" id="casesStatus">Cargando…</p>
        <div class="grid" id="casesGrid"></div>
      </div>

      <!-- TAB: Blog -->
      <div id="tab-blog" class="hide">
        <div class="tabhead">
          <button class="ghost" id="addBlogBtn" type="button">+ Nueva entrada</button>
        </div>
        <p class="muted" id="blogStatus">Cargando…</p>
        <div class="grid" id="blogGrid"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
